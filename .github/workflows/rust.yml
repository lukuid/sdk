name: SDK Rust

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "VERSION"
      - "src/rust/**"
      - "scripts/version_sync.py"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "VERSION"
      - "src/rust/**"
      - "scripts/version_sync.py"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

concurrency:
  group: sdk-rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]]
            git fetch origin main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - run: python3 scripts/version_sync.py check

  test:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - run: cargo test --manifest-path src/rust/lukuid-sdk/Cargo.toml --locked

  coverage:
    runs-on: ubuntu-latest
    needs: [meta, test]
    if: needs.test.result == 'success'
    continue-on-error: true # Report-only for now. Remove this line later to make coverage failures block the pipeline.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - name: Run Rust Coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/rust
          cargo llvm-cov \
            --manifest-path src/rust/lukuid-sdk/Cargo.toml \
            --locked \
            --lcov \
            --output-path coverage/rust/lcov.info \
            --summary-only | tee coverage/rust/coverage.txt
      - name: Summarize Coverage
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib

          lcov_path = pathlib.Path("coverage/rust/lcov.info")
          line_found = line_hit = 0
          func_found = func_hit = 0
          branch_found = branch_hit = 0

          if lcov_path.exists():
              for raw_line in lcov_path.read_text(encoding="utf-8").splitlines():
                  if raw_line.startswith("LF:"):
                      line_found += int(raw_line.split(":", 1)[1])
                  elif raw_line.startswith("LH:"):
                      line_hit += int(raw_line.split(":", 1)[1])
                  elif raw_line.startswith("FNF:"):
                      func_found += int(raw_line.split(":", 1)[1])
                  elif raw_line.startswith("FNH:"):
                      func_hit += int(raw_line.split(":", 1)[1])
                  elif raw_line.startswith("BRF:"):
                      branch_found += int(raw_line.split(":", 1)[1])
                  elif raw_line.startswith("BRH:"):
                      branch_hit += int(raw_line.split(":", 1)[1])

          def pct(hit, found):
              return f"{(hit / found * 100):.2f}%" if found else "n/a"

          summary = [
              "## SDK Rust Coverage",
              "",
              f"- Line coverage: `{pct(line_hit, line_found)}` (`{line_hit}/{line_found}`)",
              f"- Function coverage: `{pct(func_hit, func_found)}` (`{func_hit}/{func_found}`)",
              f"- Branch coverage: `{pct(branch_hit, branch_found)}` (`{branch_hit}/{branch_found}`)",
              "- LCOV output is attached as an artifact.",
              "- This is report-only today. Remove `continue-on-error: true` on the job and add explicit thresholds later when you want coverage to gate CI.",
          ]
          pathlib.Path("coverage/rust/summary.md").write_text("\n".join(summary) + "\n", encoding="utf-8")
          print("\n".join(summary))
          PY
          cat coverage/rust/summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-rust-coverage
          path: coverage/rust/**
          if-no-files-found: warn

  build:
    runs-on: ubuntu-latest
    needs: [meta, test, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - run: cargo build --manifest-path src/rust/lukuid-sdk/Cargo.toml --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-rust-dist
          path: |
            src/rust/lukuid-sdk/target/release/liblukuid_sdk.*

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: github.event_name != 'pull_request' && needs.meta.outputs.publish == 'true'
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - name: Authenticate crates.io Trusted Publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo package --manifest-path src/rust/lukuid-sdk/Cargo.toml --locked
      - run: cargo publish --manifest-path src/rust/lukuid-sdk/Cargo.toml --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SDK release $TAG"
          gh release upload "$TAG" src/rust/lukuid-sdk/target/package/*.crate --clobber
