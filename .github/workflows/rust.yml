name: SDK Rust

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "VERSION"
      - "src/rust/**"
      - "scripts/version_sync.py"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "VERSION"
      - "src/rust/**"
      - "scripts/version_sync.py"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

concurrency:
  group: sdk-rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]]
            git fetch origin main --depth=1
            git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - run: python3 scripts/version_sync.py check

  test:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - run: cargo test --manifest-path src/rust/lukuid-sdk/Cargo.toml --locked

  build:
    runs-on: ubuntu-latest
    needs: [meta, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - run: cargo build --manifest-path src/rust/lukuid-sdk/Cargo.toml --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-rust-dist
          path: |
            src/rust/lukuid-sdk/target/release/liblukuid_sdk.*

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: github.event_name != 'pull_request' && needs.meta.outputs.publish == 'true'
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux BLE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/rust/lukuid-sdk -> target
      - run: python3 scripts/version_sync.py check
      - name: Authenticate crates.io Trusted Publishing
        if: vars.CRATES_IO_TRUSTED_PUBLISHING == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - run: cargo package --manifest-path src/rust/lukuid-sdk/Cargo.toml --locked
      - run: cargo publish --manifest-path src/rust/lukuid-sdk/Cargo.toml --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token != '' && steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SDK release $TAG"
          gh release upload "$TAG" src/rust/lukuid-sdk/target/package/*.crate --clobber
