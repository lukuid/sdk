name: SDK iOS

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "VERSION"
      - "LukuIDSDK.podspec"
      - "src/ios/**"
      - "src/ios-spm-wrapper/**"
      - "scripts/version_sync.py"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "VERSION"
      - "LukuIDSDK.podspec"
      - "src/ios/**"
      - "src/ios-spm-wrapper/**"
      - "scripts/version_sync.py"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: sdk-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]]
            git fetch origin main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - run: python3 scripts/version_sync.py check

  test:
    name: Test on macOS ${{ matrix.macos }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos: macos-latest
    runs-on: ${{ matrix.macos }}
    needs: meta
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/version_sync.py check
      - run: swift test --package-path src/ios/LukuIDSDK
      - name: Install CocoaPods
        if: github.event.repository.private == false
        shell: bash
        run: |
          set -euo pipefail
          pod --version >/dev/null 2>&1 || gem install cocoapods
      - name: Lint CocoaPods Library
        if: github.event.repository.private == false
        run: pod lib lint LukuIDSDK.podspec --allow-warnings
      - name: Lint CocoaPods Spec Snapshot
        if: github.event.repository.private == false
        shell: bash
        env:
          PODSPEC_SOURCE_GIT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.clone_url || format('https://github.com/{0}.git', github.repository) }}
          PODSPEC_SOURCE_COMMIT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          source_git = os.environ["PODSPEC_SOURCE_GIT"]
          source_commit = os.environ["PODSPEC_SOURCE_COMMIT"]
          spec_path = Path("LukuIDSDK.podspec")
          spec = spec_path.read_text(encoding="utf-8")
          original = 's.source           = { :git => "https://github.com/lukuid/sdk.git", :tag => "v#{s.version}" }'
          replacement = f's.source           = {{ :git => "{source_git}", :commit => "{source_commit}" }}'
          if original not in spec:
              raise SystemExit("Expected podspec source declaration not found")
          Path("LukuIDSDK.podspec").write_text(spec.replace(original, replacement, 1), encoding="utf-8")
          PY
          pod spec lint LukuIDSDK.podspec --allow-warnings

  coverage:
    runs-on: macos-latest
    needs: [meta, test]
    if: needs.test.result == 'success'
    continue-on-error: true # Report-only for now. Remove this line later to make coverage failures block the pipeline.
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/version_sync.py check
      - name: Run Swift Coverage
        run: /usr/bin/swift test --enable-code-coverage --package-path src/ios/LukuIDSDK
      - name: Summarize Coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/ios
          python3 - <<'PY'
          import json
          from pathlib import Path

          coverage_files = sorted(Path("src/ios/LukuIDSDK/.build").glob("**/debug/codecov/*.json"))
          coverage_file = next((path for path in coverage_files if path.name.endswith(".json")), None)
          summary_path = Path("coverage/ios/summary.md")

          if coverage_file is None:
              lines = [
                  "## SDK iOS Coverage",
                  "",
                  "- Swift coverage JSON was not found under `.build/**/debug/codecov/`.",
                  "- This is report-only today. Remove `continue-on-error: true` on the job and add explicit thresholds later when you want coverage to gate CI.",
              ]
          else:
              payload = json.loads(coverage_file.read_text(encoding="utf-8"))
              files = [
                  item for item in payload["data"][0]["files"]
                  if "/Sources/LukuIDSDK/" in item["filename"]
                  and "/.build/" not in item["filename"]
                  and not item["filename"].endswith("lukuid.pb.swift")
              ]

              line_count = sum(item["summary"]["lines"]["count"] for item in files)
              line_covered = sum(item["summary"]["lines"]["covered"] for item in files)
              func_count = sum(item["summary"]["functions"]["count"] for item in files)
              func_covered = sum(item["summary"]["functions"]["covered"] for item in files)

              line_pct = f"{(line_covered / line_count * 100):.2f}%" if line_count else "0.00%"
              func_pct = f"{(func_covered / func_count * 100):.2f}%" if func_count else "0.00%"

              lines = [
                  "## SDK iOS Coverage",
                  "",
                  f"- Hand-written `Sources/LukuIDSDK` line coverage excluding generated `lukuid.pb.swift`: `{line_pct}`",
                  f"- Hand-written `Sources/LukuIDSDK` function coverage excluding generated `lukuid.pb.swift`: `{func_pct}`",
                  f"- Raw Swift coverage export: `{coverage_file}`",
                  "- This is report-only today. Remove `continue-on-error: true` on the job and add explicit thresholds later when you want coverage to gate CI.",
              ]

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY
          cat coverage/ios/summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-ios-coverage
          path: |
            coverage/ios/**
            src/ios/LukuIDSDK/.build/**/debug/codecov/**
          if-no-files-found: warn

  build:
    runs-on: macos-latest
    needs: [meta, test, coverage]
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/version_sync.py check
      - run: /usr/bin/swift build --configuration release --package-path src/ios/LukuIDSDK
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-ios-dist
          path: src/ios/LukuIDSDK/.build/**

  publish:
    runs-on: macos-latest
    needs: [meta, build]
    if: github.event_name != 'pull_request' && needs.meta.outputs.publish == 'true'
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/version_sync.py check
      - run: /usr/bin/swift build --configuration release --package-path src/ios/LukuIDSDK
      - name: Install CocoaPods
        if: github.event.repository.private == false
        shell: bash
        run: |
          set -euo pipefail
          pod --version >/dev/null 2>&1 || gem install cocoapods
      - name: Validate CocoaPods release secret
        if: github.event.repository.private == false
        shell: bash
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${COCOAPODS_TRUNK_TOKEN:-}" ]]; then
            echo "COCOAPODS_TRUNK_TOKEN is not configured in the release environment." >&2
            exit 1
          fi
      - name: Lint CocoaPods Spec
        if: github.event.repository.private == false
        run: pod spec lint LukuIDSDK.podspec --allow-warnings
      - name: Publish CocoaPods Spec
        if: github.event.repository.private == false
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "COCOAPODS_TRUNK_TOKEN is not configured. Skipping publish."
            exit 0
          fi
          pod trunk push LukuIDSDK.podspec --allow-warnings
      - name: Package SwiftPM Source Bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ios-artifacts
          ditto -c -k --sequesterRsrc --keepParent src/ios/LukuIDSDK "ios-artifacts/LukuIDSDK-source-${{ needs.meta.outputs.version }}.zip"
          shasum -a 256 "ios-artifacts/LukuIDSDK-source-${{ needs.meta.outputs.version }}.zip" > "ios-artifacts/LukuIDSDK-source-${{ needs.meta.outputs.version }}.zip.sha256"
          cp LukuIDSDK.podspec "ios-artifacts/LukuIDSDK.podspec"
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SDK release $TAG"
          gh release upload "$TAG" ios-artifacts/* --clobber
