name: SDK Python

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "VERSION"
      - "src/python/**"
      - "scripts/version_sync.py"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "VERSION"
      - "src/python/**"
      - "scripts/version_sync.py"
      - ".github/workflows/python.yml"
  workflow_dispatch:

concurrency:
  group: sdk-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]]
            git fetch origin main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - run: python3 scripts/version_sync.py check

  test:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
      - name: Install liboqs
        run: |
          git clone --branch 0.14.0 --depth 1 https://github.com/open-quantum-safe/liboqs
          cmake -S liboqs -B liboqs/build -DBUILD_SHARED_LIBS=ON -DOQS_BUILD_ONLY_LIB=ON -DOQS_ENABLE_SIG_STFL_LMS=ON -DOQS_ENABLE_SIG_STFL_XMSS=ON -DOQS_HAZARDOUS_EXPERIMENTAL_ENABLE_SIG_STFL_KEY_SIG_GEN=ON -DCMAKE_INSTALL_PREFIX=$HOME/_oqs
          cmake --build liboqs/build --parallel 4
          cmake --build liboqs/build --target install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/version_sync.py check
      - run: python3 -m pip install --upgrade pip
      - run: python3 -m pip install -e src/python
      - name: Run Python SDK Tests
        run: |
          export OQS_INSTALL_PATH=$HOME/_oqs
          python3 -m unittest discover -s src/python/tests -p "test_*.py"

  coverage:
    runs-on: ubuntu-latest
    needs: [meta, test]
    if: needs.test.result == 'success'
    continue-on-error: true # Report-only for now. Remove this line later to make coverage failures block the pipeline.
    steps:
      - uses: actions/checkout@v4
      - name: Install liboqs
        run: |
          git clone --branch 0.14.0 --depth 1 https://github.com/open-quantum-safe/liboqs
          cmake -S liboqs -B liboqs/build -DBUILD_SHARED_LIBS=ON -DOQS_BUILD_ONLY_LIB=ON -DOQS_ENABLE_SIG_STFL_LMS=ON -DOQS_ENABLE_SIG_STFL_XMSS=ON -DOQS_HAZARDOUS_EXPERIMENTAL_ENABLE_SIG_STFL_KEY_SIG_GEN=ON -DCMAKE_INSTALL_PREFIX=$HOME/_oqs
          cmake --build liboqs/build --parallel 4
          cmake --build liboqs/build --target install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/version_sync.py check
      - run: python3 -m pip install --upgrade pip
      - run: python3 -m pip install coverage
      - run: python3 -m pip install -e src/python
      - name: Run Python Coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/python
          export OQS_INSTALL_PATH=$HOME/_oqs
          python3 -m coverage run --source=src/python/lukuid_sdk -m unittest discover -s src/python/tests -p "test_*.py"
          python3 -m coverage report -m | tee coverage/python/coverage.txt
          python3 -m coverage xml -o coverage/python/coverage.xml
      - name: Summarize Coverage
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("coverage/python/coverage.txt").read_text(encoding="utf-8")
          match = re.search(r"TOTAL\s+\d+\s+\d+\s+(\d+)%", text)
          total = match.group(1) if match else "unknown"
          summary = [
              "## SDK Python Coverage",
              "",
              f"- Total statement coverage: `{total}%`",
              "- Full text report is attached as an artifact.",
              "- This is report-only today. Remove `continue-on-error: true` on the job and add `--fail-under` later when you want coverage to gate CI.",
          ]
          pathlib.Path("coverage/python/summary.md").write_text("\n".join(summary) + "\n", encoding="utf-8")
          print("\n".join(summary))
          PY
          cat coverage/python/summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-python-coverage
          path: coverage/python/**
          if-no-files-found: warn

  build:
    runs-on: ubuntu-latest
    needs: [meta, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/version_sync.py check
      - run: python3 -m pip install --upgrade pip build
      - run: python3 -m build src/python
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-python-dist
          path: src/python/dist/*

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: github.event_name != 'pull_request' && needs.meta.outputs.publish == 'true'
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sdk-python-dist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SDK release $TAG"
          gh release upload "$TAG" dist/* --clobber
