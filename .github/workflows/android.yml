name: SDK Android

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "VERSION"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "lukuid.proto"
      - "src/android/**"
      - "scripts/version_sync.py"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "VERSION"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "lukuid.proto"
      - "src/android/**"
      - "scripts/version_sync.py"
      - ".github/workflows/android.yml"
  workflow_dispatch:

concurrency:
  group: sdk-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]]
            git fetch origin main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - run: python3 scripts/version_sync.py check

  test:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: python3 scripts/version_sync.py check
      - run: chmod +x gradlew
      - run: ./gradlew :src:android:lukuid-sdk:testDebugUnitTest -PVERSION_NAME=${{ needs.meta.outputs.version }}

  coverage:
    runs-on: ubuntu-latest
    needs: [meta, test]
    if: needs.test.result == 'success'
    continue-on-error: true # Report-only for now. Remove this line later to make coverage failures block the pipeline.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: python3 scripts/version_sync.py check
      - run: chmod +x gradlew
      - name: Generate Jacoco Coverage Report
        run: ./gradlew :src:android:lukuid-sdk:jacocoDebugUnitTestReport -PVERSION_NAME=${{ needs.meta.outputs.version }}
      - name: Summarize Coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/android
          python3 - <<'PY'
          import pathlib
          import xml.etree.ElementTree as ET

          report = pathlib.Path("src/android/lukuid-sdk/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml")
          summary_path = pathlib.Path("coverage/android/summary.md")

          if report.exists():
              root = ET.parse(report).getroot()
              counters = {counter.attrib["type"]: counter.attrib for counter in root.findall("counter")}
              line = counters.get("LINE")
              branch = counters.get("BRANCH")

              def pct(counter):
                  missed = int(counter["missed"])
                  covered = int(counter["covered"])
                  total = missed + covered
                  return f"{(covered / total * 100):.2f}%" if total else "0.00%"

              lines = [
                  "## SDK Android Coverage",
                  "",
                  f"- Line coverage: `{pct(line)}`" if line else "- Line coverage: unavailable",
                  f"- Branch coverage: `{pct(branch)}`" if branch else "- Branch coverage: unavailable",
                  "- XML and HTML Jacoco reports are attached as artifacts.",
                  "- This is report-only today. Remove `continue-on-error: true` on the job and wire Jacoco thresholds later when you want coverage to gate CI.",
              ]
          else:
              lines = [
                  "## SDK Android Coverage",
                  "",
                  "- Jacoco report file was not found.",
                  "- This is report-only today. Remove `continue-on-error: true` on the job and wire Jacoco thresholds later when you want coverage to gate CI.",
              ]

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY
          cat coverage/android/summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-android-coverage
          path: |
            coverage/android/**
            src/android/lukuid-sdk/build/reports/jacoco/jacocoDebugUnitTestReport/**
          if-no-files-found: warn

  build:
    runs-on: ubuntu-latest
    needs: [meta, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: python3 scripts/version_sync.py check
      - run: chmod +x gradlew
      - run: ./gradlew :src:android:lukuid-sdk:assembleRelease -PVERSION_NAME=${{ needs.meta.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-android-dist
          path: src/android/lukuid-sdk/build/outputs/aar/*.aar

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: github.event_name != 'pull_request' && needs.meta.outputs.publish == 'true'
    environment: release
    permissions:
      contents: write
      packages: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: python3 scripts/version_sync.py check
      - run: chmod +x gradlew
      - run: ./gradlew :src:android:lukuid-sdk:publishReleasePublicationToGitHubPackagesRepository -PVERSION_NAME=${{ needs.meta.outputs.version }}
      - name: Publish To Sonatype Central Staging API
        if: vars.MAVEN_CENTRAL_NAMESPACE != ''
        run: ./gradlew :src:android:lukuid-sdk:publishReleasePublicationToSonatypeCentralRepository -PVERSION_NAME=${{ needs.meta.outputs.version }}
      - name: Transfer Staged Deployment To Maven Central
        if: vars.MAVEN_CENTRAL_NAMESPACE != ''
        shell: bash
        run: |
          set -euo pipefail
          AUTH_HEADER="$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          curl --fail-with-body --request POST \
            --header "Authorization: Bearer ${AUTH_HEADER}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${{ vars.MAVEN_CENTRAL_NAMESPACE }}?publishing_type=automatic"
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SDK release $TAG"
          gh release upload "$TAG" src/android/lukuid-sdk/build/outputs/aar/*.aar --clobber
