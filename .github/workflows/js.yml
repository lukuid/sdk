name: SDK JS

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "VERSION"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "lukuid.proto"
      - "src/js/**"
      - "tools/build-cdn.mjs"
      - "scripts/version_sync.py"
      - ".github/workflows/js.yml"
  pull_request:
    paths:
      - "VERSION"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "lukuid.proto"
      - "src/js/**"
      - "tools/build-cdn.mjs"
      - "scripts/version_sync.py"
      - ".github/workflows/js.yml"
  workflow_dispatch:

concurrency:
  group: sdk-js-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$VERSION" ]]
            git fetch origin main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - run: python3 scripts/version_sync.py check

  test:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - run: python3 scripts/version_sync.py check
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r test

  coverage:
    runs-on: ubuntu-latest
    needs: [meta, test]
    if: needs.test.result == 'success'
    continue-on-error: true # Report-only for now. Remove this line later to make coverage failures block the pipeline.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - run: python3 scripts/version_sync.py check
      - run: pnpm install --frozen-lockfile
      - name: Run JS Core Coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/js
          (
            cd src/js/core
            node --experimental-test-coverage --import tsx --test test/*.test.ts
          ) 2>&1 | tee coverage/js/core-coverage.txt
      - name: Summarize Coverage
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re

          report_path = pathlib.Path("coverage/js/core-coverage.txt")
          text = report_path.read_text(encoding="utf-8")
          match = re.search(r"all files\s+\|\s+([0-9.]+)\s+\|\s+([0-9.]+)\s+\|\s+([0-9.]+)\s+\|", text)
          if match:
              line_pct, branch_pct, func_pct = match.groups()
              summary = [
                  "## SDK JS Coverage",
                  "",
                  f"- `@lukuid/core`: line `{line_pct}%`, branch `{branch_pct}%`, functions `{func_pct}%`",
                  "- `@lukuid/sdk`, `@lukuid/transport-webusb`, `@lukuid/transport-webble`, `@lukuid/transport-serial-node`, and `@lukuid/transport-ble-node` still have placeholder test commands, so this job reports core coverage only.",
                  "- This is report-only today. Remove `continue-on-error: true` on the job and add explicit thresholds when you want coverage to gate CI.",
              ]
          else:
              summary = [
                  "## SDK JS Coverage",
                  "",
                  "- Coverage command completed, but the aggregate coverage line could not be parsed from `coverage/js/core-coverage.txt`.",
                  "- This is report-only today. Remove `continue-on-error: true` on the job and add explicit thresholds when you want coverage to gate CI.",
              ]

          pathlib.Path("coverage/js/summary.md").write_text("\n".join(summary) + "\n", encoding="utf-8")
          print("\n".join(summary))
          PY
          cat coverage/js/summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-js-coverage
          path: coverage/js/**
          if-no-files-found: warn

  build:
    runs-on: ubuntu-latest
    needs: [meta, test, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - run: python3 scripts/version_sync.py check
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm run build:cdn
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-js-dist
          path: |
            dist-cdn/**
            src/js/*/dist/**

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: github.event_name != 'pull_request' && needs.meta.outputs.publish == 'true'
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - run: python3 scripts/version_sync.py check
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm run build:cdn
      - name: Publish Packages
        shell: bash
        run: |
          set -euo pipefail
          for dir in \
            src/js/core \
            src/js/transport-webble \
            src/js/transport-webusb \
            src/js/transport-ble-node \
            src/js/transport-serial-node \
            src/js/sdk; do
            (
              cd "$dir"
              PACKAGE_NAME="$(node -p "require('./package.json').name")"
              PACKAGE_VERSION="$(node -p "require('./package.json').version")"
              if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
                echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; version already published."
                exit 0
              fi
              pnpm publish --access public --provenance --no-git-checks
            )
          done
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.meta.outputs.version }}"
          cp dist-cdn/lukuid-sdk.global.js "lukuid-sdk.global-${{ needs.meta.outputs.version }}.js"
          sha256sum "lukuid-sdk.global-${{ needs.meta.outputs.version }}.js" > "lukuid-sdk.global-${{ needs.meta.outputs.version }}.js.sha256"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SDK release $TAG"
          gh release upload "$TAG" \
            "lukuid-sdk.global-${{ needs.meta.outputs.version }}.js" \
            "lukuid-sdk.global-${{ needs.meta.outputs.version }}.js.sha256" \
            --clobber
